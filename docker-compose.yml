version: "3"

services:
  client:
    build: ./client
    container_name: frontend
    ports:
      - "3001:80"
    depends_on:
      - server
    restart: always

  server:
    build: ./server
    container_name: backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/contactdb
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data: